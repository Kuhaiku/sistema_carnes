<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoaFácil - Gestão de Carnês</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Variáveis de Grid controladas via JS */
        #containerCards {
            display: grid;
            gap: 1rem;
        }
        .modal-active { overflow: hidden; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-20">

    <div id="modalPagamento" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="fixed inset-0 modal-overlay" onclick="fecharModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden relative z-10 flex flex-col">
            <header class="p-6 border-b flex justify-between items-center bg-indigo-600 text-white">
                <div>
                    <h2 id="modalNome" class="text-2xl font-bold">Nome do Doador</h2>
                    <p id="modalInfo" class="text-indigo-100 text-sm font-medium"></p>
                </div>
                <button onclick="fecharModal()" class="p-2 hover:bg-indigo-700 rounded-full transition-colors text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </header>
            <div id="modalCorpo" class="p-6 overflow-y-auto flex-1">
                </div>
            <footer id="modalAcoes" class="p-4 border-t bg-slate-50 hidden">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                    <span id="labelAcao" class="font-medium text-slate-600"></span>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <input type="number" id="inputValorModal" class="px-4 py-2 border rounded-lg w-full sm:w-32 focus:ring-2 focus:ring-indigo-500 outline-none" step="0.01" placeholder="0.00">
                        <button id="btnSalvarModal" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors">Salvar</button>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <header class="mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-emerald-100 p-3 rounded-xl text-emerald-600">💰</div>
                <div><p class="text-xs text-slate-500 font-bold uppercase">Arrecadado</p><p class="text-xl font-black text-slate-800" id="totalValor">R$ 0,00</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-blue-100 p-3 rounded-xl text-blue-600">📄</div>
                <div><p class="text-xs text-slate-500 font-bold uppercase">Folhas Pagas</p><p class="text-xl font-black text-slate-800" id="totalFolhas">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-indigo-100 p-3 rounded-xl text-indigo-600">📚</div>
                <div><p class="text-xs text-slate-500 font-bold uppercase">Carnês</p><p class="text-xl font-black text-slate-800" id="totalCarnes">0</p></div>
            </div>
            <div class="flex items-center">
                <button onclick="alternarLista()" id="btnVerLista" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <span id="textoBotaoLista">Carregar Lista de Carnês</span>
                </button>
            </div>
        </header>

        <section id="sessaoLista" class="hidden animate-fade-in">
            <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
                <input type="text" id="busca" placeholder="Filtrar por nome ou número..." class="w-full md:w-96 px-4 py-2 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" oninput="renderizarCards()">
                <button onclick="document.getElementById('formCadastroSessao').classList.toggle('hidden')" class="text-indigo-600 font-bold text-sm hover:underline">+ Novo Cadastro</button>
            </div>

            <div id="formCadastroSessao" class="hidden bg-white p-6 rounded-2xl shadow-sm border mb-8">
                <form id="formCadastro" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <input type="text" id="nome" required placeholder="Nome" class="px-4 py-2 border rounded-xl">
                    <input type="tel" id="telefone" required placeholder="Telefone" class="px-4 py-2 border rounded-xl">
                    <input type="text" id="numCarne" required placeholder="Nº Carnê" class="px-4 py-2 border rounded-xl">
                    <button type="submit" class="bg-indigo-600 text-white font-bold py-2 rounded-xl">Cadastrar</button>
                </form>
            </div>

            <div id="containerCards"></div>
        </section>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DE LAYOUT (Ajuste aqui)
        // ==========================================
        const CONFIG = {
            COLUNAS_DESKTOP: 4, // Quantidade de cards por linha no PC
            COLUNAS_TABLET: 2,
            COLUNAS_MOBILE: 1,
            MAX_RESULTADOS: 100 // Limite de cards para manter a fluidez
        };

        let bdCarnes = [];
        let listaAberta = false;
        let carneSelecionado = null;

        const formatarMoeda = (valor) => Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // Aplica o layout de colunas configurado
        function aplicarEstiloGrid() {
            const container = document.getElementById('containerCards');
            container.style.gridTemplateColumns = `repeat(${CONFIG.COLUNAS_MOBILE}, minmax(0, 1fr))`;
            if (window.innerWidth >= 768) container.style.gridTemplateColumns = `repeat(${CONFIG.COLUNAS_TABLET}, minmax(0, 1fr))`;
            if (window.innerWidth >= 1024) container.style.gridTemplateColumns = `repeat(${CONFIG.COLUNAS_DESKTOP}, minmax(0, 1fr))`;
        }
        window.addEventListener('resize', aplicarEstiloGrid);

        async function carregarDashboard() {
            try {
                const response = await fetch('/api/carnes');
                bdCarnes = await response.json();
                atualizarDashboard();
            } catch (e) { console.error("Erro dashboard", e); }
        }

        function atualizarDashboard() {
            let total = 0, pagas = 0;
            bdCarnes.forEach(c => c.folhas.forEach(f => { if(f.paga) { total += f.valor; pagas++; } }));
            document.getElementById('totalValor').textContent = formatarMoeda(total);
            document.getElementById('totalFolhas').textContent = pagas;
            document.getElementById('totalCarnes').textContent = bdCarnes.length;
        }

        function alternarLista() {
            listaAberta = !listaAberta;
            const sessao = document.getElementById('sessaoLista');
            const btnTxt = document.getElementById('textoBotaoLista');
            
            if (listaAberta) {
                sessao.classList.remove('hidden');
                btnTxt.textContent = "Recolher Lista";
                aplicarEstiloGrid();
                renderizarCards();
            } else {
                sessao.classList.add('hidden');
                btnTxt.textContent = "Carregar Lista de Carnês";
            }
        }

        function renderizarCards() {
            const container = document.getElementById('containerCards');
            const busca = document.getElementById('busca').value.toLowerCase();
            container.innerHTML = '';

            const filtrados = bdCarnes.filter(c => 
                c.nome.toLowerCase().includes(busca) || c.numero.toString().includes(busca)
            ).slice(0, CONFIG.MAX_RESULTADOS);

            filtrados.forEach(carne => {
                const pagas = carne.folhas.filter(f => f.paga).length;
                const total = carne.folhas.length;
                const progresso = (pagas / total) * 100;

                const card = document.createElement('div');
                card.className = "bg-white border rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer border-l-4 " + (progresso === 100 ? "border-l-emerald-500" : "border-l-indigo-500");
                card.onclick = () => abrirModal(carne.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-black uppercase px-2 py-0.5 bg-slate-100 rounded text-slate-500">Nº ${carne.numero}</span>
                        <div class="text-right">
                             <p class="text-xs font-bold text-emerald-600">${pagas}/${total} pagas</p>
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 truncate mb-4">${carne.nome}</h3>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-indigo-500 h-full transition-all" style="width: ${progresso}%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==========================================
        // LÓGICA DO MODAL
        // ==========================================
        function abrirModal(id) {
            carneSelecionado = bdCarnes.find(c => c.id === id);
            if(!carneSelecionado) return;

            document.getElementById('modalNome').textContent = carneSelecionado.nome;
            document.getElementById('modalInfo').textContent = `Carnê ${carneSelecionado.numero} • ${carneSelecionado.telefone}`;
            
            renderizarFolhasModal();
            
            document.getElementById('modalPagamento').classList.remove('hidden');
            document.body.classList.add('modal-active');
            document.getElementById('modalAcoes').classList.add('hidden');
        }

        function fecharModal() {
            document.getElementById('modalPagamento').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        function renderizarFolhasModal() {
            const corpo = document.getElementById('modalCorpo');
            corpo.innerHTML = '<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3"></div>';
            const grid = corpo.firstChild;

            carneSelecionado.folhas.forEach(folha => {
                const btn = document.createElement('button');
                btn.className = `p-3 rounded-xl border-2 transition-all flex flex-col items-center justify-center gap-1 ${folha.paga ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-200 hover:border-indigo-300'}`;
                btn.onclick = () => prepararPagamento(folha);
                btn.innerHTML = `
                    <span class="text-[10px] font-bold uppercase">Folha ${folha.index}</span>
                    <span class="text-sm font-black">${folha.paga ? formatarMoeda(folha.valor) : 'Pendente'}</span>
                `;
                grid.appendChild(btn);
            });
        }

        function prepararPagamento(folha) {
            const acoes = document.getElementById('modalAcoes');
            const input = document.getElementById('inputValorModal');
            const label = document.getElementById('labelAcao');
            const btn = document.getElementById('btnSalvarModal');

            acoes.classList.remove('hidden');
            label.innerHTML = `Registrar Folha <strong>${folha.index}</strong>`;
            input.value = folha.paga ? folha.valor : "";
            input.focus();

            btn.onclick = async () => {
                const valor = parseFloat(input.value);
                if(!valor || valor <= 0) return alert("Valor inválido");

                try {
                    await fetch(`/api/carnes/${carneSelecionado.id}/folhas/${folha.index}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ valor })
                    });
                    await carregarDashboard(); // Recarrega dados globais
                    carneSelecionado = bdCarnes.find(c => c.id === carneSelecionado.id); // Atualiza referência local
                    renderizarFolhasModal();
                    renderizarCards();
                    acoes.classList.add('hidden');
                } catch (e) { alert("Erro ao salvar"); }
            };
        }

        // Cadastro simplificado
        document.getElementById('formCadastro').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                numero: document.getElementById('numCarne').value
            };
            try {
                await fetch('/api/carnes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                this.reset();
                await carregarDashboard();
                renderizarCards();
                document.getElementById('formCadastroSessao').classList.add('hidden');
            } catch (e) { alert("Erro ao cadastrar"); }
        });

        // Inicialização
        carregarDashboard();
    </script>
</body>
</html>

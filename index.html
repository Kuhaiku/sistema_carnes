<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoaFácil - Gestão de Carnês</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *:focus-visible { outline: 2px solid #4f46e5; outline-offset: 2px; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Animação do Toast */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-20">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 w-80"></div>

    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-3 rounded-xl shadow-md flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">DoaFácil</h1>
                    <p class="text-sm text-slate-500 font-medium">Gestão de Carnês de Doação</p>
                </div>
            </div>
            <div class="w-full md:w-96 relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="busca" placeholder="Buscar por nome ou nº do carnê..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none" oninput="renderizarCarnes()">
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                <div class="bg-emerald-100 p-4 rounded-xl text-emerald-600">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div><p class="text-sm text-slate-500 font-semibold mb-1">Total Arrecadado</p><p class="text-2xl font-bold text-slate-800" id="totalValor">R$ 0,00</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                <div class="bg-blue-100 p-4 rounded-xl text-blue-600">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div><p class="text-sm text-slate-500 font-semibold mb-1">Folhas Pagas</p><p class="text-2xl font-bold text-slate-800" id="totalFolhas">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                <div class="bg-indigo-100 p-4 rounded-xl text-indigo-600">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div><p class="text-sm text-slate-500 font-semibold mb-1">Carnês Ativos</p><p class="text-2xl font-bold text-slate-800" id="totalCarnes">0</p></div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <h2 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Emitir Novo Carnê
            </h2>
            <form id="formCadastro" class="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                <div class="flex flex-col md:col-span-2">
                    <label for="nome" class="text-sm font-semibold text-slate-600 mb-1.5">Nome do Doador</label>
                    <input type="text" id="nome" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none" placeholder="Ex: João da Silva">
                </div>
                <div class="flex flex-col">
                    <label for="telefone" class="text-sm font-semibold text-slate-600 mb-1.5">Telefone</label>
                    <input type="tel" id="telefone" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none" placeholder="(00) 00000-0000">
                </div>
                <div class="flex flex-col">
                    <label for="numCarne" class="text-sm font-semibold text-slate-600 mb-1.5">Nº do Carnê</label>
                    <input type="text" id="numCarne" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none" placeholder="Ex: 1024">
                </div>
                <div class="md:col-span-4 flex justify-end mt-2">
                    <button type="submit" id="btnGerar" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-8 rounded-xl shadow-sm hover:shadow transition-all flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                        <span>Gerar Carnê</span>
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div id="loading" class="hidden text-center py-10">
                <svg class="animate-spin h-8 w-8 text-indigo-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-slate-500 font-medium mt-3">Carregando dados...</p>
            </div>
            <div id="listaCarnes" class="grid grid-cols-1 gap-6"></div>
        </section>
    </div>

    <script>
        let bdCarnes = [];
        const formatarMoeda = (valor) => Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // --- FEEDBACK VISUAL (TOAST) ---
        function mostrarToast(mensagem, tipo = 'sucesso') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const cores = {
                sucesso: 'bg-emerald-500',
                erro: 'bg-red-500',
                info: 'bg-blue-500'
            };
            
            const icones = {
                sucesso: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>',
                erro: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',
                info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
            };

            toast.className = `${cores[tipo]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-enter`;
            toast.innerHTML = `${icones[tipo]} <span class="font-medium text-sm">${mensagem}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- INTEGRAÇÃO COM A API ---
        async function carregarDados() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('listaCarnes').classList.add('hidden');
            try {
                const response = await fetch('/api/carnes');
                bdCarnes = await response.json();
                atualizarDashboard();
                renderizarCarnes();
            } catch (error) {
                mostrarToast("Erro ao carregar os dados.", "erro");
                console.error(error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('listaCarnes').classList.remove('hidden');
            }
        }

        document.getElementById('formCadastro').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGerar');
            const conteudoOriginalBtn = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Gerando...';

            const payload = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                numero: document.getElementById('numCarne').value
            };

            try {
                const response = await fetch('/api/carnes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || "Erro desconhecido");
                }
                
                this.reset();
                mostrarToast("Carnê gerado com sucesso!", "sucesso");
                await carregarDados(); 
            } catch (error) {
                mostrarToast(error.message, "erro");
            } finally {
                btn.disabled = false;
                btn.innerHTML = conteudoOriginalBtn;
            }
        });

        async function excluirCarne(id) {
            if (!confirm("Tem certeza que deseja excluir este carnê permanentemente?")) return;
            try {
                const response = await fetch(`/api/carnes/${id}`, { method: 'DELETE' });
                if(!response.ok) throw new Error("Falha na exclusão");
                mostrarToast("Carnê excluído.", "info");
                await carregarDados();
            } catch (error) {
                mostrarToast("Erro ao excluir.", "erro");
            }
        }

        async function confirmarPagamento(carneId, indexFolha) {
            const input = document.getElementById(`input-valor-${carneId}`);
            const btn = document.getElementById(`btn-salvar-${carneId}`);
            const valor = parseFloat(input.value);

            if (!valor || valor <= 0) {
                mostrarToast("Insira um valor válido para prosseguir.", "erro");
                input.focus();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Salvando...';

            try {
                const response = await fetch(`/api/carnes/${carneId}/folhas/${indexFolha}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valor })
                });
                if(!response.ok) throw new Error("Falha no pagamento");
                
                mostrarToast(`Valor da folha ${indexFolha} registrado!`, "sucesso");
                await carregarDados();
            } catch (error) {
                mostrarToast("Erro ao processar o lançamento.", "erro");
                btn.disabled = false;
                btn.innerHTML = 'Salvar';
            }
        }

        // --- CONTROLE DE INTERFACE ---
        function atualizarDashboard() {
            let totalArrecadado = 0, folhasPagas = 0;
            bdCarnes.forEach(carne => carne.folhas.forEach(f => {
                if (f.paga) { totalArrecadado += f.valor; folhasPagas++; }
            }));
            document.getElementById('totalValor').textContent = formatarMoeda(totalArrecadado);
            document.getElementById('totalFolhas').textContent = folhasPagas;
            document.getElementById('totalCarnes').textContent = bdCarnes.length;
        }

        function toggleExpandir(id) {
            const carne = bdCarnes.find(c => c.id === id);
            if (carne) { carne.expandido = !carne.expandido; renderizarCarnes(); }
        }

        function abrirInputInline(carneId, indexFolha) {
            const carne = bdCarnes.find(c => c.id === carneId);
            if (carne) { 
                carne.folhaAtiva = indexFolha; 
                renderizarCarnes(); 
                setTimeout(() => {
                    const input = document.getElementById(`input-valor-${carneId}`);
                    if(input) { input.focus(); input.select(); }
                }, 50);
            }
        }

        function cancelarInputInline(carneId) {
            const carne = bdCarnes.find(c => c.id === carneId);
            if (carne) { carne.folhaAtiva = null; renderizarCarnes(); }
        }

        function renderizarCarnes() {
            const termoBusca = document.getElementById('busca').value.toLowerCase();
            const lista = document.getElementById('listaCarnes');
            lista.innerHTML = '';

            const filtrados = bdCarnes.filter(c => c.nome.toLowerCase().includes(termoBusca) || c.numero.includes(termoBusca));
            
            if (filtrados.length === 0) { 
                lista.innerHTML = `
                <div class="text-center py-12 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <svg class="w-12 h-12 text-slate-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-slate-500 font-medium">Nenhum carnê encontrado.</p>
                </div>`; 
                return; 
            }

            filtrados.forEach(carne => {
                let folhasHTML = '';
                
                carne.folhas.forEach(folha => {
                    const isAtiva = carne.folhaAtiva === folha.index;
                    
                    if (folha.paga) {
                        const classPagaAtiva = isAtiva ? 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-500 shadow-md transform scale-105 z-10' : 'border-emerald-200 bg-emerald-50 hover:bg-emerald-100 hover:border-emerald-300 shadow-sm';
                        
                        folhasHTML += `
                            <button onclick="abrirInputInline(${carne.id}, ${folha.index})" class="relative border ${classPagaAtiva} rounded-xl p-3 flex flex-col items-center justify-center transition-all cursor-pointer h-20 w-full group text-left">
                                <span class="absolute top-1.5 right-1.5 text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity ${isAtiva ? 'text-indigo-500 opacity-100' : ''}">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </span>
                                <span class="text-xs font-bold uppercase tracking-wider ${isAtiva ? 'text-indigo-700' : 'text-emerald-700'} mb-1">Mês ${folha.index}</span>
                                <span class="text-sm font-extrabold ${isAtiva ? 'text-indigo-600' : 'text-emerald-600'} break-all">${formatarMoeda(folha.valor)}</span>
                            </button>`;
                    } else {
                        const classPendenteAtiva = isAtiva ? 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-500 shadow-md transform scale-105 z-10' : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50 bg-white shadow-sm';
                        
                        folhasHTML += `
                            <button onclick="abrirInputInline(${carne.id}, ${folha.index})" class="border ${classPendenteAtiva} rounded-xl p-3 flex flex-col items-center justify-center transition-all cursor-pointer h-20 w-full group text-left border-dashed">
                                <span class="text-xs font-semibold uppercase tracking-wider ${isAtiva ? 'text-indigo-600' : 'text-slate-400 group-hover:text-indigo-500'} mb-1">Mês ${folha.index}</span>
                                <span class="text-xs font-medium px-2 py-0.5 rounded-full ${isAtiva ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'} mt-1">Pendente</span>
                            </button>`;
                    }
                });

                let blocoPagamento = '';
                if (carne.folhaAtiva) {
                    const folhaAtivaObj = carne.folhas.find(f => f.index === carne.folhaAtiva);
                    const isEdicao = folhaAtivaObj && folhaAtivaObj.paga;
                    const valorAtual = isEdicao ? folhaAtivaObj.valor : '';
                    const textoBotao = isEdicao ? 'Atualizar Valor' : 'Confirmar Recebimento';

                    blocoPagamento = `
                        <div class="mt-6 p-5 border border-indigo-100 bg-indigo-50/50 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4 transition-all">
                            <div class="flex items-center gap-3">
                                <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <span class="text-slate-700 font-medium">${isEdicao ? 'Editando' : 'Lançando'} <strong class="text-indigo-700">Mês ${carne.folhaAtiva}</strong></span>
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <div class="relative w-full sm:w-40">
                                    <span class="absolute left-3 top-2.5 text-slate-400 font-medium">R$</span>
                                    <input type="number" id="input-valor-${carne.id}" value="${valorAtual}" class="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white font-medium text-slate-800" placeholder="0.00" step="0.01">
                                </div>
                                <button id="btn-salvar-${carne.id}" onclick="confirmarPagamento(${carne.id}, ${carne.folhaAtiva})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-semibold transition-all shadow-sm whitespace-nowrap">${textoBotao}</button>
                                <button onclick="cancelarInputInline(${carne.id})" class="bg-white border border-slate-300 hover:bg-slate-100 text-slate-500 hover:text-slate-700 px-3 py-2 rounded-lg transition-colors shadow-sm" title="Cancelar">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;
                }

                const chevronIcon = carne.expandido 
                    ? '<svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>' 
                    : '<svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>'; 

                lista.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5 border-b border-slate-100 pb-4">
                            <div class="flex items-center gap-4">
                                <div class="bg-slate-50 p-3 rounded-full border border-slate-100">
                                    <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="text-xl font-bold text-slate-800">${carne.nome}</h3>
                                    <p class="text-sm text-slate-500 mt-0.5 flex items-center gap-1.5 font-medium">
                                        <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                        ${carne.telefone}
                                    </p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                                <span class="bg-slate-100 text-slate-700 text-sm font-bold px-4 py-1.5 rounded-lg border border-slate-200">Nº ${carne.numero}</span>
                                <div class="h-6 w-px bg-slate-200"></div>
                                <button onclick="excluirCarne(${carne.id})" class="p-2 text-red-500 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors border border-transparent hover:border-red-100" title="Excluir Carnê">
                                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                                <button onclick="toggleExpandir(${carne.id})" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors border border-transparent hover:border-slate-200" title="${carne.expandido ? 'Recolher' : 'Expandir'}">
                                    ${chevronIcon}
                                </button>
                            </div>
                        </div>
                        <div class="${carne.expandido ? 'block animate-fade-in' : 'hidden'}">
                            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-12 gap-3">
                                ${folhasHTML}
                            </div>
                            ${blocoPagamento}
                        </div>
                    </div>`;
            });
        }

        // Inicia a aplicação
        carregarDados();
    </script>
</body>
</html>
